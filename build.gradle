plugins {
    id 'java'
    id 'com.android.library' version '8.2.0' apply false
}

android {
    namespace 'org.firstinspires.ftc.teamcode'
    compileSdk 34
}

repositories {
    mavenCentral()
    google()
}

dependencies {
    // FTC Robot Server SDK
    implementation 'com.qualcomm.ftcrobotcontroller:ftc-robot-server:9.0.1'

    // Road Runner
    implementation 'com.acmerobotics.dashboard:dashboard:0.5.2'
    implementation 'com.acmerobotics.roadrunner:core:0.5.6'

    // OpenCV for AprilTag
    implementation 'org.openftc:opencv:4.8.0'

    // Apache Commons Math for PIDF
    implementation 'org.apache.commons:commons-math3:3.6.1'
}

java {
    sourceCompatibility = JavaVersion.VERSION_11
    targetCompatibility = JavaVersion.VERSION_11
}